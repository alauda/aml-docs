# DeepSeek-R1-Distill-Llama-70B (BF16) — vLLM-Ascend, TP=8, eight Ascend 910B3 whole cards.
# 70B BF16 weights are ~141 GB, so it needs all 8 cards (TP=8 = 1 replica per node). This is
# the engine-parity / accuracy carrier (gsm8k 0.945 ≈ RHOAI base FP8, proving lossless output).
# Use v0.18.0-openeuler, NOT v0.19.1rc1 — the latter has a detok bug that drops Ġ/Ċ (harmless
# for perf, fatal for accuracy). Change metadata.namespace, the image tag, and storageUri first.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: deepseek-r1-llama-70b-vllm-ascend-tp8
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      autoSelect: false
  containers:
    - name: kserve-container
      image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler
      command: [python3, -m, vllm.entrypoints.openai.api_server]
      args:
        - --model=/mnt/models
        - --served-model-name=deepseek-r1-llama-70b
        - --host=0.0.0.0
        - --port=8080
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: "16", memory: 128Gi }
        limits: { cpu: "64", memory: 400Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: deepseek-r1-llama-70b-tp8
  namespace: demo
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.knative.dev/progress-deadline: "3600s"   # 141 GB load + first graph compile
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    hostIPC: true                                     # TP=8 HCCL goes through host IPC
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: deepseek-r1-llama-70b-vllm-ascend-tp8
      storageUri: pvc://deepseek-r1-distill-llama-70b/
      args:
        - --tensor-parallel-size
        - "8"
        - --max-model-len
        - "16384"
        - --dtype
        - bfloat16
        - --gpu-memory-utilization
        - "0.92"
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --trust-remote-code
        - --seed
        - "1024"
        # FULL_DECODE_ONLY gave the best single-stream ITL (tuned 123 -> 56 ms).
        - --compilation-config
        - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      env:
        - { name: HOME, value: /tmp }
        - { name: HCCL_OP_EXPANSION_MODE, value: AIV }
        - { name: HCCL_BUFFSIZE, value: "200" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
      resources:
        requests: { cpu: "16", memory: 128Gi }
        limits:
          cpu: "64"
          memory: 400Gi
          huawei.com/Ascend910B3: "8"               # eight whole cards
          huawei.com/Ascend910B3-memory: "65536"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 1000 }
