# GLM-5.1-W4A8 (MoE, W4A8 quantized) — vLLM-Ascend, TP=8 + expert parallel, eight Ascend
# 910B3 whole cards. The W4A8 weights are ~391 GB (vs ~1.5 TB at BF16), so it occupies a full
# 8-card node. Validated for the Partner-Guide Chatbot set (512/256, rate 1-9, 0 server errors).
#
# Two non-obvious requirements proven on-site:
#   * Image MUST be >= v0.19.1rc1-openeuler: v0.18.0 ships transformers 4.57.4, too old for the
#     GLM-5.1 `glm_moe_dsa` model type (needs transformers >= 5.2.0).
#   * --enforce-eager is REQUIRED: >=512-token prefill otherwise triggers an AI Core fault in the
#     W4A8 dynamic-quant kernel (aclnnDynamicQuantV2). Eager mode bypasses the buggy compiled
#     kernel; cost is ~20-30% higher ITL.
#
# Known tuning lever: concurrency is pinned at 2 by --max-num-seqs=2 (config, not hardware —
# single-stream uses only ~1.6% of HBM bandwidth). Raising it is the next throughput lever.
# Change metadata.namespace, the image tag, and storageUri before applying.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: glm-5-1-w4a8-vllm-ascend
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      autoSelect: false
  containers:
    - name: kserve-container
      image: quay.io/ascend/vllm-ascend:v0.19.1rc1-openeuler
      command: [python3, -m, vllm.entrypoints.openai.api_server]
      args:
        - --model=/mnt/models
        - --served-model-name=glm-5-1-w4a8
        - --host=0.0.0.0
        - --port=8080
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: "8", memory: 64Gi }
        limits: { cpu: "32", memory: 256Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: glm-5-1-w4a8
  namespace: demo
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.knative.dev/progress-deadline: "3600s"   # 391 GB load + first compile
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    hostIPC: true                                     # TP=8 HCCL goes through host IPC
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: glm-5-1-w4a8-vllm-ascend
      storageUri: pvc://glm-5-1-w4a8/GLM-5.1-w4a8/
      args:
        - --tensor-parallel-size
        - "8"
        - --enable-expert-parallel
        - --data-parallel-size
        - "1"
        - --quantization
        - ascend
        - --max-model-len
        - "32768"
        - --max-num-seqs
        - "2"
        - --max-num-batched-tokens
        - "4096"
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --async-scheduling
        - --gpu-memory-utilization
        - "0.95"
        - --trust-remote-code
        - --seed
        - "1024"
        - --enforce-eager
        - --compilation-config
        - '{"cudagraph_mode": "FULL_DECODE_ONLY", "pass_config": {"fuse_norm_quant": false, "fuse_act_quant": true, "fuse_attn_quant": false, "enable_sp": false, "fuse_gemm_comms": false, "fuse_allreduce_rms": false}}'
        - --additional-config
        - '{"fuse_muls_add": true, "multistream_overlap_shared_expert": true, "ascend_compilation_config": {"enable_npugraph_ex": true}}'
        - --speculative-config
        - '{"num_speculative_tokens": 3, "method": "deepseek_mtp"}'
      env:
        - { name: HOME, value: /tmp }
        - { name: HCCL_OP_EXPANSION_MODE, value: AIV }
        - { name: HCCL_BUFFSIZE, value: "200" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
        - { name: VLLM_ASCEND_BALANCE_SCHEDULING, value: "1" }
      resources:
        requests: { cpu: "8", memory: 64Gi }
        limits:
          cpu: "32"
          memory: 256Gi
          huawei.com/Ascend910B3: "8"               # eight whole cards
          huawei.com/Ascend910B3-memory: "65536"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 1000 }
