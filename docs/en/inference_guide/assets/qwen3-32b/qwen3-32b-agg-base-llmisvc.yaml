# Qwen3-32B (BF16) — agg-base aggregation on Alauda AI's InferNex deployment
# surface: KServe `LLMInferenceService` + InferNex-Bridge + vLLM-Ascend ModelCar.
# This is the EXACT shape that was deployed and benchmarked (TP=4 × 2 replicas =
# 8 Ascend 910B4 cards).
#
# How it works: you write the LLMInferenceService (with infernex.io/runtime=true);
# the InferNex-Bridge reconciles it into a hermes-router (EPP) + N vLLM-Ascend
# aggregation instances. The two LLMInferenceServiceConfig objects are the engine
# template and the router/EPP template.
#
# agg-base = aggregation, hermes-router strategy `random` (pure load-balancing),
# no mooncake KV store, no cache-indexer. For the cross-instance KV store + KV-
# cache-aware routing variant see qwen3-32b-agg-mc-kv-llmisvc.yaml.
#
# Before applying, replace:
#   - the model.uri registry (default = public docker.io/alaudadockerhub)  : your aml-harbor ModelCar registry (host[:port])
#   - namespace `demo` : the namespace you deploy the LLMInferenceService in
#   - the modelcar pull secret (modelcar-registry-auth) must exist + be on the SA
# The Ascend resource key (huawei.com/Ascend910) is this node's device-plugin key.
---
# (1) Engine template: aggregation single-role, vLLM-Ascend v0.18.0, TP=4,
#     native ModelCar (/mnt/models), no mooncake (agg-base).
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: qwen3-32b-agg-engine
  namespace: kserve
spec:
  template:
    containers:
      - name: main
        image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler
        imagePullPolicy: IfNotPresent
        command: ["bash", "-c"]
        args:
          - |
            set -ex
            source /usr/local/Ascend/ascend-toolkit/set_env.sh
            source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
            exec python3 -m vllm.entrypoints.openai.api_server \
              --port 8000 \
              --served-model-name "Qwen/Qwen3-32B" \
              --model /mnt/models \
              --trust-remote-code \
              --enable-prefix-caching \
              --enable-prompt-tokens-details \
              --tensor-parallel-size 4 \
              --pipeline-parallel-size 1 \
              --max-model-len 40960 \
              --max-num-batched-tokens 40960 \
              --gpu-memory-utilization 0.8 \
              --block-size 128
        ports:
          - { name: http, containerPort: 8000, protocol: TCP }
        env:
          - { name: HOME, value: /home }
          - { name: VLLM_USE_V1, value: "1" }
          - { name: HF_HUB_OFFLINE, value: "1" }
        resources:
          requests: { cpu: "2",  memory: 16Gi, huawei.com/Ascend910: "4" }
          limits:   { cpu: "16", memory: 64Gi, huawei.com/Ascend910: "4" }
        securityContext:
          # Ascend CANN needs real root (davinci_manager ioctls, driver access).
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          seccompProfile: { type: RuntimeDefault }
        startupProbe:   { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 80 }  # 32B loads slowly: ~40min budget
        readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
        livenessProbe:  { httpGet: { path: /health, port: http }, periodSeconds: 10, timeoutSeconds: 10, failureThreshold: 3 }
        volumeMounts:
          - { name: shm, mountPath: /dev/shm }
    volumes:
      - { name: shm, emptyDir: { medium: Memory, sizeLimit: 24Gi } }
    imagePullSecrets:
      - { name: modelcar-registry-auth }
---
# (2) Router template = hermes-router (EPP), `random` strategy. No tokenizer,
#     no cache-indexer (those are only needed for the kv-cache-aware variant).
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: qwen3-32b-agg-router
  namespace: kserve
  labels:
    app.kubernetes.io/part-of: infernex-bridge
spec:
  router:
    scheduler:
      pool:
        spec:
          selector:
            matchLabels:
              app.kubernetes.io/name: qwen3-32b-agg-base
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
            - number: 8000
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: qwen3-32b-agg-base-epp-service
            port: { number: 9002 }
      template:
        serviceAccountName: qwen3-32b-agg-base-epp-sa
        containers:
          - name: main
            image: build-harbor.alauda.cn/3rdparty/openfuyao/hermes-router:26.6.0-rc.2
            imagePullPolicy: IfNotPresent
            ports:
              - { containerPort: 9002, name: grpc,        protocol: TCP }
              - { containerPort: 9003, name: grpc-health, protocol: TCP }
              - { containerPort: 9090, name: metrics,     protocol: TCP }
            args:
              - --pool-name
              - qwen3-32b-agg-base-inference-pool
              - --pool-namespace
              - demo
              - --pool-group
              - inference.networking.k8s.io
              - --zap-encoder
              - json
              - --v
              - "1"
              - --tracing
              - "false"
              - --metrics-endpoint-auth
              - "false"
              - --config-text
              - |-
                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                - type: metrics-data-source
                  parameters: { scheme: "http", path: "/metrics", insecureSkipVerify: true }
                - type: core-metrics-extractor
                - type: random-picker
                schedulingProfiles:
                - name: default
                  plugins:
                  - pluginRef: random-picker
            livenessProbe:  { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            readinessProbe: { grpc: { port: 9003, service: readiness }, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            startupProbe:   { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 30 }
            resources:
              requests: { cpu: "1", memory: 1Gi }
              limits:   { memory: 4Gi }
            volumeMounts:
              - { name: tls-certs, mountPath: /etc/ssl/certs, readOnly: true }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }
              seccompProfile: { type: RuntimeDefault }
        volumes:
          - name: tls-certs
            secret:
              secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30
---
# (3) LLMInferenceService: binds the ModelCar + the two configs above, sets the
#     replica count, and disables the components agg-base does not use.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen3-32b-agg-base
  namespace: demo
  labels:
    infernex.io/runtime: "true"          # triggers InferNex-Bridge reconcile
  annotations:
    # agg-base: no mooncake KV store, no cache-indexer; fixed replicas (no autoscaler).
    infernex.io/disabled-components: "mooncake,cache-indexer,pd-orchestrator,eagle-eye"
spec:
  model:
    uri: oci://docker.io/alaudadockerhub/modelcar-qwen3-32b:v0.1.0
    name: Qwen/Qwen3-32B                  # == --served-model-name (keep aligned)
  baseRefs:
    - name: qwen3-32b-agg-engine
    - name: qwen3-32b-agg-router
  router:
    scheduler: {}
    gateway: {}
    route: {}
  replicas: 2                             # 2 instances × TP=4 = 8 cards
