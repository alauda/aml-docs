# Qwen3-32B (BF16) — agg-mc-kv aggregation: agg-base PLUS a cross-instance KV
# cache store (mooncake / AscendStoreConnector) and KV-cache-aware routing.
# Same InferNex deployment surface (KServe LLMInferenceService + InferNex-Bridge
# + vLLM-Ascend ModelCar), TP=4 × 2 replicas = 8 Ascend 910B4 cards.
#
# Difference vs agg-base (three places):
#   (1) Engine: a mooncake-config-init writes /app/mooncake.json, and vLLM gets
#       --kv-events-config + --kv-transfer-config (AscendStoreConnector, backend
#       mooncake) so block-level KV is published to a shared store.
#   (2) Router/EPP: hermes-router strategy `kv-cache-aware` — adds a tokenizer
#       sidecar + prefix-cache-producer + kvcache-aware-scorer + min-score-picker,
#       so requests are routed to the instance most likely to already hold the
#       prefix KV.
#   (3) LLMInferenceService: mooncake + cache-indexer are ENABLED (only
#       pd-orchestrator + eagle-eye disabled). InferNex-Bridge reconciles the
#       mooncake-master + cache-indexer + redis backends.
#
# Cross-pod KV transfer needs the on-chip RoCE NIC to have a device IP. On a node
# without an hccn-config DaemonSet you must apply the /etc/hccn.conf IPs once
# (hccn_tool -i N -ip -s ...), otherwise the store stays at ~0% external hit.
#
# served-model-name / tokenizer model / client `-m` / model.name MUST all be the
# same loadable id (Qwen/Qwen3-32B). A short name makes the EPP tokenizer fail and
# silently degrades KV-aware routing to plain load-balancing.
#
# Before applying, set the namespace `demo` (model.uri already points at the public Docker Hub ModelCar). For a private mirror also ensure the
# modelcar pull secret exists. The cache-indexer/tokenizer images may need to be
# pre-pulled + retagged on nodes that cannot reach cr.openfuyao.cn.
---
# (1) Engine template: aggregation TP=4 + mooncake (AscendStoreConnector / kv-events / kv-transfer)
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: qwen3-32b-aggmckv-engine
  namespace: kserve
spec:
  template:
    initContainers:
      - name: mooncake-config-init
        image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            cat > /app/mooncake.json <<EOF
            {"local_hostname":"${POD_IP:-0.0.0.0}","metadata_server":"redis://redis-service:6379","master_server_address":"mooncake-master-service:30089","device_name":"","protocol":"ascend","global_segment_size":42949672960,"use_ascend_direct":true}
            EOF
            cat /app/mooncake.json
        env:
          - name: POD_IP
            valueFrom: { fieldRef: { fieldPath: status.podIP } }
        volumeMounts:
          - { name: mooncake-config, mountPath: /app }
    containers:
      - name: main
        image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler   # same image as mooncake-master (RPC compat)
        imagePullPolicy: IfNotPresent
        command: ["bash", "-c"]
        args:
          - |
            set -ex
            source /usr/local/Ascend/ascend-toolkit/set_env.sh
            source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
            export LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH:-}"   # ascend_transport.so (mooncake)
            exec python3 -m vllm.entrypoints.openai.api_server \
              --port 8000 \
              --served-model-name "Qwen/Qwen3-32B" \
              --model /mnt/models \
              --trust-remote-code \
              --enable-prefix-caching \
              --prefix-caching-hash-algo sha256_cbor \
              --enable-prompt-tokens-details \
              --tensor-parallel-size 4 \
              --pipeline-parallel-size 1 \
              --max-model-len 40960 \
              --max-num-batched-tokens 40960 \
              --gpu-memory-utilization 0.8 \
              --block-size 128 \
              --kv-events-config '{"enable_kv_cache_events": true, "publisher":"zmq", "topic":"kv-events"}' \
              --kv-transfer-config '{"engine_id":"$(POD_NAME)","kv_connector":"AscendStoreConnector","kv_role":"kv_both","kv_port":"20000","kv_connector_extra_config":{"backend":"mooncake","decode":{"dp_size":1,"tp_size":4},"prefill":{"dp_size":1,"tp_size":4},"lookup_rpc_port":"1"}}'
        ports:
          - { name: http, containerPort: 8000, protocol: TCP }
          - { name: zmq-pub, containerPort: 5557, protocol: TCP }
        env:
          - { name: HOME, value: /home }
          - { name: HF_HUB_OFFLINE, value: "1" }
          - { name: PYTHONHASHSEED, value: "0" }
          - { name: VLLM_USE_V1, value: "1" }
          - { name: VLLM_KV_EVENTS_USE_INT_BLOCK_HASHES, value: "1" }
          - { name: MOONCAKE_CONFIG_PATH, value: /app/mooncake.json }
          - { name: HCCL_SOCKET_IFNAME, value: eth0 }
          - { name: HCCL_INTRA_ROCE_ENABLE, value: "1" }   # same-node cross-pod KV over NIC RoCE/RDMA
          - { name: HCCL_IF_IP, valueFrom: { fieldRef: { fieldPath: status.podIP } } }
          - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
          - { name: POD_IP,   valueFrom: { fieldRef: { fieldPath: status.podIP } } }
        resources:
          requests: { cpu: "2",  memory: 16Gi, huawei.com/Ascend910: "4" }
          limits:   { cpu: "16", memory: 64Gi, huawei.com/Ascend910: "4" }
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          seccompProfile: { type: RuntimeDefault }
        startupProbe:   { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 80 }
        readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
        livenessProbe:  { httpGet: { path: /health, port: http }, periodSeconds: 10, timeoutSeconds: 10, failureThreshold: 3 }
        volumeMounts:
          - { name: mooncake-config, mountPath: /app, readOnly: true }
          - { name: shm, mountPath: /dev/shm }
    volumes:
      - { name: mooncake-config, emptyDir: {} }
      - { name: shm, emptyDir: { medium: Memory, sizeLimit: 24Gi } }
    imagePullSecrets:
      - { name: modelcar-registry-auth }
---
# (2) Router template = hermes-router (EPP), kv-cache-aware: tokenizer sidecar +
#     prefix-cache-producer + kvcache-aware-scorer + min-score-picker.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: qwen3-32b-aggmckv-router
  namespace: kserve
  labels:
    app.kubernetes.io/part-of: infernex-bridge
spec:
  router:
    scheduler:
      pool:
        spec:
          selector:
            matchLabels:
              app.kubernetes.io/name: qwen3-32b-agg-mc-kv
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
            - number: 8000
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: qwen3-32b-agg-mc-kv-epp-service
            port: { number: 9002 }
      template:
        serviceAccountName: qwen3-32b-agg-mc-kv-epp-sa
        containers:
          - name: tokenizer        # kv-cache-aware needs token IDs to compute prefix hashes
            image: cr.openfuyao.cn/openfuyao/hermes-router-tokenizer:latest
            imagePullPolicy: IfNotPresent
            args: ["--socket-path", "/var/run/tokenizer/tokenizer.sock"]
            env:
              - { name: TOKENIZER_PROVIDER, value: huggingface }
              - { name: TOKENIZER_CACHE_DIR, value: /workspace/.cache/huggingface/hub }
              - { name: VLLM_CACHE_ROOT, value: /tmp/vllm-cache }
            resources:
              requests: { cpu: "2", memory: 8Gi }
              limits:   { memory: 16Gi }
            volumeMounts:
              - { name: tokenizer-socket-volume, mountPath: /var/run/tokenizer }
          - name: main
            image: build-harbor.alauda.cn/3rdparty/openfuyao/hermes-router:26.6.0-rc.2
            imagePullPolicy: IfNotPresent
            ports:
              - { containerPort: 9002, name: grpc,        protocol: TCP }
              - { containerPort: 9003, name: grpc-health, protocol: TCP }
              - { containerPort: 9090, name: metrics,     protocol: TCP }
            args:
              - --pool-name
              - qwen3-32b-agg-mc-kv-inference-pool
              - --pool-namespace
              - demo
              - --pool-group
              - inference.networking.k8s.io
              - --zap-encoder
              - json
              - --v
              - "1"
              - --tracing
              - "false"
              - --metrics-endpoint-auth
              - "false"
              - --config-text
              - |-
                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                - type: metrics-data-source
                  parameters: { scheme: "http", path: "/metrics", insecureSkipVerify: true }
                - type: core-metrics-extractor
                - type: tokenizer
                  parameters: { model: Qwen/Qwen3-32B, socketPath: /var/run/tokenizer/tokenizer.sock }
                - type: request-lifecycle-tracker
                  parameters: { storeName: hermes-inflight, persistence: { enabled: false } }
                - type: inflight-data-producer
                  parameters: { storeName: hermes-inflight }
                - type: prefix-cache-producer
                  parameters: { cacheIndexerAddress: http://qwen3-32b-agg-mc-kv-cache-indexer:8080 }
                - type: kvcache-aware-scorer
                  parameters: { kvCacheNotHitRateWeight: 1, xpuCacheUsageWeight: 1, waitingRequestWeight: 1, inflightWeight: 1 }
                - type: min-score-picker
                schedulingProfiles:
                - name: default
                  plugins:
                  - pluginRef: tokenizer
                  - pluginRef: request-lifecycle-tracker
                  - pluginRef: inflight-data-producer
                  - pluginRef: prefix-cache-producer
                  - pluginRef: kvcache-aware-scorer
                  - pluginRef: min-score-picker
            livenessProbe:  { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            readinessProbe: { grpc: { port: 9003, service: readiness }, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            startupProbe:   { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 30 }
            resources:
              requests: { cpu: "2", memory: 1Gi }
              limits:   { memory: 4Gi }
            volumeMounts:
              - { name: tls-certs, mountPath: /etc/ssl/certs, readOnly: true }
              - { name: tokenizer-socket-volume, mountPath: /var/run/tokenizer }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }
              seccompProfile: { type: RuntimeDefault }
        volumes:
          - name: tls-certs
            secret:
              secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
          - { name: tokenizer-socket-volume, emptyDir: {} }
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30
---
# (3) LLMInferenceService: mooncake + cache-indexer ENABLED (only pd-orchestrator + eagle-eye off).
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen3-32b-agg-mc-kv
  namespace: demo
  labels:
    infernex.io/runtime: "true"
  annotations:
    infernex.io/disabled-components: "pd-orchestrator,eagle-eye"
spec:
  model:
    uri: oci://docker.io/alaudadockerhub/modelcar-qwen3-32b:v0.1.0
    name: Qwen/Qwen3-32B                  # keep == served-model-name == EPP tokenizer model == client -m
  baseRefs:
    - name: qwen3-32b-aggmckv-engine
    - name: qwen3-32b-aggmckv-router
  router:
    scheduler: {}
    gateway: {}
    route: {}
  replicas: 2                             # 2 instances × TP=4 = 8 cards
