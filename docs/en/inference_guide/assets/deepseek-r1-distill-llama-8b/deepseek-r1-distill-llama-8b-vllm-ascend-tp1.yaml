# DeepSeek-R1-Distill-Llama-8B (BF16) — vLLM-Ascend, TP=1, single Ascend 910B4 whole card.
# The "mature Llama path" anchor: LlamaForCausalLM is fully native on AscendC, so this 8B
# runs at high hardware efficiency on a single card (16 GB weights fit a 32 GB card with
# ~11 GB KV headroom -> ~20 concurrent seqs at max-model-len 4096, enough for chat).
# Change metadata.namespace, the image tag, and storageUri before applying.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: deepseek-r1-llama-8b-vllm-ascend-tp1
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      autoSelect: false
  containers:
    - name: kserve-container
      # vLLM-Ascend nightly (validated: vllm v0.20.2 + CANN 9.0.0). Match the tag to your driver.
      image: quay.io/ascend/vllm-ascend:nightly-main-openeuler
      command: [python3, -m, vllm.entrypoints.openai.api_server]
      args:
        - --model=/mnt/models
        - --served-model-name=deepseek-r1-llama-8b
        - --host=0.0.0.0
        - --port=8080
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: 500m, memory: 8Gi }
        limits: { cpu: "8", memory: 24Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: deepseek-r1-llama-8b-tp1
  namespace: demo
  annotations:
    serving.kserve.io/deploymentMode: Standard
    serving.knative.dev/progress-deadline: "1800s"
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      protocolVersion: v2
      runtime: deepseek-r1-llama-8b-vllm-ascend-tp1
      # Validated from a ModelCar OCI image; a PVC of the weights works too.
      storageUri: oci://<registry>/modelcar-deepseek-r1-distill-llama-8b:v0.1.0
      args:
        - --tensor-parallel-size
        - "1"
        - --max-model-len
        - "4096"
        - --dtype
        - bfloat16
        - --trust-remote-code
        - --max-num-batched-tokens
        - "4096"
        - --compilation-config
        - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
        - --additional-config
        - '{"weight_prefetch_config":{"enabled":true},"ascend_compilation_config":{"enable_npugraph_ex":true,"fuse_qknorm_rope":true}}'
      env:
        - { name: HOME, value: /tmp }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "max_split_size_mb:256" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: GPU_MEMORY_UTILIZATION, value: "0.85" }
      resources:
        requests: { cpu: 500m, memory: 8Gi }
        limits:
          cpu: "8"
          memory: 24Gi
          huawei.com/Ascend910: "1"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 1000
