# DeepSeek-V4-Flash (W4A8) — agg-base aggregation on Alauda AI's InferNex surface:
# KServe `LLMInferenceService` + InferNex-Bridge + vLLM-Ascend ModelCar. This is the
# EXACT shape that was deployed and benchmarked.
#
# DeepSeek-V4-Flash is the `deepseek_v4` architecture: 256-expert MoE + MLA + DSA
# sparse attention + MTP, served as W4A8 (~151 GB weights, 43 layers). Because the
# weights need all 8 cards, the topology is **1 instance × TP=8 (+ expert parallel)**,
# NOT the 2 × TP=4 used by the smaller models. With a single instance the
# hermes-router is a no-op (one endpoint), but the agg-base structure is kept for
# consistency.
#
# Image: the release-pinned nightly `nightly-releases-v0.22.1rc-openeuler` (same as
# Qwen3.6-27B) carries the full deepseek_v4 stack. The startup flags follow the
# image's own tutorial (docs/source/tutorials/models/DeepSeek-V4-Flash.md), tuned for
# 32 GB cards (batched 2048 / seqs 4 / gpu-mem 0.90 — the KV-vs-activation balance on
# 32 GB). `enable_dsa_cp` is intentionally OFF (an upstream DSA-CP index-buffer bug
# crashes sustained 8k MTP decode on this build).
#
# Note on prefix caching: it is enabled but the hit rate is 0 — DSA sparse attention
# selects KV per query, so a shared prefix cannot be reused directly. It costs ~nothing
# and is kept for full-feature delivery; the speedup over older builds comes from the
# nightly stack itself, not from prefix caching.
#
# Before applying, set the namespace `demo` (model.uri already points at the public Docker Hub ModelCar). For a private registry also ensure the
# modelcar pull secret exists. The node needs enough ephemeral disk for the ~128 GB
# ModelCar (native oci:// to /mnt/models).
---
# (1) LLMInferenceService: binds the ModelCar, inlines the TP=8 engine podTemplate,
#     references the router preset, replicas=1, disables non-agg-base components.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: deepseek-v4-flash-w4a8-agg-base
  namespace: demo
  labels:
    infernex.io/runtime: "true"          # triggers InferNex-Bridge reconcile
  annotations:
    infernex.io/disabled-components: "mooncake,cache-indexer,pd-orchestrator,eagle-eye"
spec:
  model:
    uri: oci://docker.io/alaudadockerhub/modelcar-deepseek-v4-flash-w4a8-mtp:v0.1.0
    name: gdydems/DeepSeek-V4-Flash-w4a8-mtp   # == --served-model-name (keep aligned)
  replicas: 1                            # 1 instance × TP=8 = 8 cards (whole node)
  template:
    containers:
      - name: main
        image: quay.io/ascend/vllm-ascend:nightly-releases-v0.22.1rc-openeuler
        imagePullPolicy: IfNotPresent
        command: ["bash", "-lc"]
        args:
          - |
            set -ex
            source /usr/local/Ascend/ascend-toolkit/set_env.sh
            source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
            source /usr/local/Ascend/nnal/asdsip/set_env.sh 2>/dev/null || true
            exec python3 -m vllm.entrypoints.openai.api_server \
              --port 8000 \
              --served-model-name "gdydems/DeepSeek-V4-Flash-w4a8-mtp" \
              --model /mnt/models \
              --trust-remote-code \
              --data-parallel-size 1 \
              --tensor-parallel-size 8 \
              --enable-expert-parallel \
              --quantization ascend \
              --tokenizer-mode deepseek_v4 \
              --safetensors-load-strategy prefetch \
              --model-loader-extra-config '{"enable_multithread_load":"true","num_threads":128}' \
              --max-model-len 32768 \
              --max-num-batched-tokens 2048 \
              --max-num-seqs 4 \
              --gpu-memory-utilization 0.90 \
              --block-size 128 \
              --async-scheduling \
              --enable-prefix-caching \
              --no-disable-hybrid-kv-cache-manager \
              --chat-template /vllm-workspace/vllm/examples/tool_chat_template_deepseekv3.jinja \
              --speculative-config '{"num_speculative_tokens":1,"method":"mtp","enforce_eager":true}' \
              --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}' \
              --additional-config '{"ascend_compilation_config":{"enable_npugraph_ex":true,"enable_static_kernel":false},"enable_cpu_binding":true,"multistream_overlap_shared_expert":true}'
        ports:
          - { name: http, containerPort: 8000, protocol: TCP }
        env:
          - { name: HOME, value: /home }
          - { name: HF_HUB_OFFLINE, value: "1" }
          - { name: VLLM_USE_V1, value: "1" }
          - { name: PYTHONHASHSEED, value: "0" }
          - { name: OMP_PROC_BIND, value: "false" }
          - { name: OMP_NUM_THREADS, value: "10" }
          - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: LD_PRELOAD, value: "/usr/lib/aarch64-linux-gnu/libjemalloc.so.2" }
          - { name: HCCL_BUFFSIZE, value: "1024" }
          - { name: VLLM_ASCEND_ENABLE_FLASHCOMM1, value: "1" }
          - { name: TASK_QUEUE_ENABLE, value: "1" }
          - { name: HCCL_OP_EXPANSION_MODE, value: "AIV" }
        resources:
          requests: { cpu: "8",  memory: 64Gi,  huawei.com/Ascend910: "8" }
          limits:   { cpu: "64", memory: 256Gi, huawei.com/Ascend910: "8" }
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          seccompProfile: { type: RuntimeDefault }
        startupProbe:   { httpGet: { path: /health, port: http }, periodSeconds: 30, failureThreshold: 120 }  # modelcar + TP8 load + graph capture: ~60min budget
        readinessProbe: { httpGet: { path: /health, port: http }, periodSeconds: 10, failureThreshold: 3 }
        livenessProbe:  { httpGet: { path: /health, port: http }, periodSeconds: 10, timeoutSeconds: 10, failureThreshold: 3 }
        volumeMounts:
          - { name: shm, mountPath: /dev/shm }
    volumes:
      - { name: shm, emptyDir: { medium: Memory, sizeLimit: 32Gi } }
    imagePullSecrets:
      - { name: modelcar-registry-auth }
  baseRefs:
    - name: deepseek-v4-flash-w4a8-agg-router
  router:
    scheduler: {}
    gateway: {}
    route: {}
---
# (2) Router preset = hermes-router (EPP), `random` strategy. With a single TP=8
#     instance this is a no-op, but kept for the consistent agg-base structure.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: deepseek-v4-flash-w4a8-agg-router
  namespace: kserve
  labels:
    app.kubernetes.io/part-of: infernex-bridge
spec:
  router:
    scheduler:
      pool:
        spec:
          selector:
            matchLabels:
              app.kubernetes.io/name: deepseek-v4-flash-w4a8-agg-base
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
            - number: 8000
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: deepseek-v4-flash-w4a8-agg-base-epp-service
            port: { number: 9002 }
      template:
        serviceAccountName: deepseek-v4-flash-w4a8-agg-base-epp-sa
        containers:
          - name: main
            image: build-harbor.alauda.cn/3rdparty/openfuyao/hermes-router:26.6.0-rc.2
            imagePullPolicy: IfNotPresent
            ports:
              - { containerPort: 9002, name: grpc,        protocol: TCP }
              - { containerPort: 9003, name: grpc-health, protocol: TCP }
              - { containerPort: 9090, name: metrics,     protocol: TCP }
            args:
              - --pool-name
              - deepseek-v4-flash-w4a8-agg-base-inference-pool
              - --pool-namespace
              - demo
              - --pool-group
              - inference.networking.k8s.io
              - --zap-encoder
              - json
              - --v
              - "1"
              - --tracing
              - "false"
              - --metrics-endpoint-auth
              - "false"
              - --config-text
              - |-
                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                - type: metrics-data-source
                  parameters: { scheme: "http", path: "/metrics", insecureSkipVerify: true }
                - type: core-metrics-extractor
                - type: random-picker
                schedulingProfiles:
                - name: default
                  plugins:
                  - pluginRef: random-picker
            livenessProbe:  { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            readinessProbe: { grpc: { port: 9003, service: readiness }, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 3 }
            startupProbe:   { grpc: { port: 9003, service: liveness },  periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 30 }
            resources:
              requests: { cpu: "1", memory: 1Gi }
              limits:   { memory: 4Gi }
            volumeMounts:
              - { name: tls-certs, mountPath: /etc/ssl/certs, readOnly: true }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }
              seccompProfile: { type: RuntimeDefault }
        volumes:
          - name: tls-certs
            secret:
              secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30
