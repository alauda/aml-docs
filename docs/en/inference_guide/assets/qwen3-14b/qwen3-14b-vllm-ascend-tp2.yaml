# Qwen3-14B (dense, BF16) — vLLM-Ascend, TP=2, two Ascend 910B3 whole cards.
# Use TP=2 for long-context scenarios: cross-card prefill cuts RAG TTFT p90 from
# ~47s (TP=1) to ~1.3s. For short chat, TP=2 adds no decode throughput over TP=1
# (prefer TP=1 + more replicas there). Requires hostIPC for HCCL all-reduce.
# Change `metadata.namespace`, the image tag, and `storageUri` before applying.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-14b-vllm-ascend-tp2
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      autoSelect: false
  containers:
    - name: kserve-container
      image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler
      command: [python3, -m, vllm.entrypoints.openai.api_server]
      args:
        - --model=/mnt/models
        - --served-model-name=qwen3-14b
        - --host=0.0.0.0
        - --port=8080
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: "8", memory: 48Gi }
        limits: { cpu: "24", memory: 128Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-14b-vllm-tp2
  namespace: demo
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.knative.dev/progress-deadline: "1800s"
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    hostIPC: true                                  # TP=2 HCCL goes through host IPC
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: qwen3-14b-vllm-ascend-tp2
      storageUri: pvc://qwen3-14b-bf16/
      args:
        - --tensor-parallel-size
        - "2"
        - --max-model-len
        - "16384"
        - --max-num-seqs
        - "256"
        - --gpu-memory-utilization
        - "0.90"
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --trust-remote-code
        - --seed
        - "1024"
        - --compilation-config
        - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      env:
        - { name: HOME, value: /tmp }
        - { name: HCCL_OP_EXPANSION_MODE, value: AIV }
        - { name: HCCL_BUFFSIZE, value: "200" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
      resources:
        requests: { cpu: "8", memory: 48Gi }
        limits:
          cpu: "24"
          memory: 128Gi
          huawei.com/Ascend910B3: "2"              # two whole cards
          huawei.com/Ascend910B3-memory: "65536"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 1000 }
