# Qwen3-30B-A3B (MoE, 30B total / 3B active, BF16) — vLLM-Ascend, TP=4 + expert
# parallel, four Ascend 910B3 whole cards.
#
# NOTE on engine choice: on vLLM-Ascend v0.18 the MoE kernels are immature, so this
# config is the *baseline* for the cross-engine comparison — MindIE reached far higher
# capacity on the same model/hardware (Chat 5.90 vs 2.68 RPS, Code 9x). For production
# MoE serving, prefer the MindIE example. Keep this one for an apples-to-apples
# vLLM baseline or if you standardize on a single engine.
#
# Change `metadata.namespace`, the image tag, and `storageUri` before applying.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-30b-a3b-vllm-ascend-tp4
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      autoSelect: false
  containers:
    - name: kserve-container
      image: quay.io/ascend/vllm-ascend:v0.18.0-openeuler
      command: [python3, -m, vllm.entrypoints.openai.api_server]
      args:
        - --model=/mnt/models
        - --served-model-name=qwen3-30b-a3b
        - --host=0.0.0.0
        - --port=8080
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: "8", memory: 64Gi }
        limits: { cpu: "32", memory: 200Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-30b-a3b-vllm-tp4
  namespace: demo
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.knative.dev/progress-deadline: "2400s"
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    hostIPC: true
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: qwen3-30b-a3b-vllm-ascend-tp4
      storageUri: pvc://qwen3-30b-a3b-bf16/
      args:
        - --tensor-parallel-size
        - "4"
        - --enable-expert-parallel          # 128 experts sharded across 4 cards
        - --enforce-eager                   # MoE on v0.18: eager is the stable path
        - --max-model-len
        - "16384"
        - --max-num-seqs
        - "256"
        - --gpu-memory-utilization
        - "0.92"
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --trust-remote-code
        - --seed
        - "1024"
      env:
        - { name: HOME, value: /tmp }
        - { name: HCCL_OP_EXPANSION_MODE, value: AIV }
        - { name: HCCL_BUFFSIZE, value: "200" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
      resources:
        requests: { cpu: "8", memory: 64Gi }
        limits:
          cpu: "32"
          memory: 200Gi
          huawei.com/Ascend910B3: "4"              # four whole cards
          huawei.com/Ascend910B3-memory: "65536"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 1000 }
