# Qwen3-30B-A3B (MoE, BF16) — MindIE 2.2.RC1, TP=4, four Ascend 910B3 whole cards.
#
# RECOMMENDED engine for this MoE on Ascend: in the cross-engine open-loop test
# MindIE beat vLLM-Ascend v0.18 across the board (Chat 5.90 vs 2.68 RPS, Code 9x,
# rate-1 ITL 6.7x). MindIE picks BF16 automatically from the weights (no dtype flag).
#
# This is a namespace-scoped ServingRuntime (NOT ClusterServingRuntime). The startup
# script is the platform's standard run_mindie.sh: it auto-detects the number of
# allocated NPUs (npu-smi) and sets worldSize, so TP follows the device count you
# request in the InferenceService (4 here). MindIE needs root and a writable model
# volume — keep `serving.kserve.io/readonly: "false"` and the root securityContext.
#
# Change `metadata.namespace`, the image tag, and `storageUri` before applying.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-30b-a3b-mindie-tp4
  namespace: demo
  annotations:
    cpaas.io/display-name: mindie-2.2RC1-800I-A2
  labels:
    cpaas.io/accelerator-type: npu
    cpaas.io/cann-version: "8.3.0"
    cpaas.io/runtime-class: mindie
    aml.cpaas.io/runtime-type: mindie
spec:
  containers:
    - name: kserve-container
      # AscendHub MindIE image for the 800I-A2 (Atlas 800I A2 / 910B) form factor.
      image: swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie:2.2.RC1-800I-A2-py311-openeuler24.03-lts
      command:
        - bash
        - -c
        - |
          REAL_SCRIPT=$(echo "$RAW_SCRIPT" | sed 's/__LT__/\x3c/g')
          echo "$REAL_SCRIPT" > /tmp/startup.sh
          chmod +x /tmp/startup.sh

          if [ ! -d "${MODEL_PATH}" ]; then
              MODEL_DIR="/mnt/models"
              echo "[WARNING] Model directory ${MODEL_PATH} not found, using ${MODEL_DIR} instead"
              MODEL_PATH="${MODEL_DIR}"
          fi

          ls -ld "${MODEL_PATH}"
          chmod -R 755 "${MODEL_PATH}"

          /tmp/startup.sh --model-name "${MODEL_NAME}" --model-path "${MODEL_PATH}" --ip "${MY_POD_IP}"
      env:
        - name: MODEL_NAME
          value: '{{ index .Annotations "aml-model-repo" }}'
        - name: MODEL_PATH
          value: /mnt/models/{{ index .Annotations "aml-model-repo" }}
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: RAW_SCRIPT
          value: |
            #!/bin/bash
            # run_mindie.sh — start MindIE Service for a given model.
            # Required: --model-name, --model-path. Optional: --ip, --max-seq-len,
            # --max-iter-times, --world-size, ... (run with --help for the full list).
            help() { awk -F'### ' '/^###/ { print $2 }' "$0"; }
            if [[ $# == 0 ]] || [[ "$1" == "--help" ]]; then help; exit 1; fi

            total_count=$(npu-smi info -l | grep "Total Count" | awk -F ':' '{print $2}' | xargs)
            if [[ -z "$total_count" ]]; then
                echo "Error: unable to read device info (npu-smi). Check permissions/devices."
                exit 1
            fi
            echo "$total_count device(s) detected!"

            echo "Setting toolkit envs..."
            source /usr/local/Ascend/ascend-toolkit/set_env.sh
            echo "Setting MindIE envs..."
            source /usr/local/Ascend/mindie/set_env.sh

            MF_SCRIPTS_ROOT=$(realpath "$(dirname "$0")")
            export PYTHONPATH=$MF_SCRIPTS_ROOT/../:$PYTHONPATH

            export MIES_INSTALL_PATH=/usr/local/Ascend/mindie/latest/mindie-service
            CONFIG_FILE=${MIES_INSTALL_PATH}/conf/config.json

            # defaults
            BACKEND_TYPE="atb"; MAX_SEQ_LEN=16384; MAX_PREFILL_TOKENS=16384
            MAX_ITER_TIMES=1536; MAX_INPUT_TOKEN_LEN=12288; TRUNCATION=false
            HTTPS_ENABLED=false; MULTI_NODES_INFER_ENABLED=false; NPU_MEM_SIZE=-1
            MAX_PREFILL_BATCH_SIZE=50; TEMPLATE_TYPE="Standard"; MAX_PREEMPT_COUNT=0
            SUPPORT_SELECT_BATCH=false; IP_ADDRESS="0.0.0.0"; PORT=8080
            MANAGEMENT_IP_ADDRESS="127.0.0.2"; MANAGEMENT_PORT=1026; METRICS_PORT=1027

            while [[ "$#" -gt 0 ]]; do
                case $1 in
                    --model-path) MODEL_WEIGHT_PATH="$2"; shift ;;
                    --model-name) MODEL_NAME="$2"; shift ;;
                    --max-seq-len) MAX_SEQ_LEN="$2"; shift ;;
                    --max-iter-times) MAX_ITER_TIMES="$2"; shift ;;
                    --max-input-token-len) MAX_INPUT_TOKEN_LEN="$2"; shift ;;
                    --max-prefill-tokens) MAX_PREFILL_TOKENS="$2"; shift ;;
                    --world-size) WORLD_SIZE="$2"; shift ;;
                    --ip) IP_ADDRESS="$2"; shift ;;
                    --port) PORT="$2"; shift ;;
                    *) echo "Unknown parameter: $1"; exit 1 ;;
                esac
                shift
            done

            if [ -z "$MODEL_WEIGHT_PATH" ] || [ -z "$MODEL_NAME" ]; then
                echo "Error: --model-path and --model-name are required."; exit 1
            fi

            # TP follows the allocated device count.
            WORLD_SIZE=$total_count
            NPU_DEVICE_IDS=$(seq -s, 0 $(($WORLD_SIZE - 1)))

            if [ "$MAX_PREFILL_TOKENS" -lt "$MAX_SEQ_LEN" ]; then
                MAX_PREFILL_TOKENS=$MAX_SEQ_LEN
            fi

            MODEL_CONFIG_FILE="${MODEL_WEIGHT_PATH}/config.json"
            if [ ! -f "$MODEL_CONFIG_FILE" ]; then
                echo "Error: config.json not found in $MODEL_WEIGHT_PATH."; exit 1
            fi
            chmod 600 "$MODEL_CONFIG_FILE"
            chmod u+w ${MIES_INSTALL_PATH}/conf/

            # MindIE config.json is nested JSON — edit with sed against the known keys.
            sed -i "s/\"backendType\"\s*:\s*\"[^\"]*\"/\"backendType\": \"$BACKEND_TYPE\"/" $CONFIG_FILE
            sed -i "s/\"modelName\"\s*:\s*\"[^\"]*\"/\"modelName\": \"$MODEL_NAME\"/" $CONFIG_FILE
            sed -i "s|\"modelWeightPath\"\s*:\s*\"[^\"]*\"|\"modelWeightPath\": \"$MODEL_WEIGHT_PATH\"|" $CONFIG_FILE
            sed -i "s/\"maxSeqLen\"\s*:\s*[0-9]*/\"maxSeqLen\": $MAX_SEQ_LEN/" "$CONFIG_FILE"
            sed -i "s/\"maxPrefillTokens\"\s*:\s*[0-9]*/\"maxPrefillTokens\": $MAX_PREFILL_TOKENS/" "$CONFIG_FILE"
            sed -i "s/\"maxIterTimes\"\s*:\s*[0-9]*/\"maxIterTimes\": $MAX_ITER_TIMES/" "$CONFIG_FILE"
            sed -i "s/\"maxInputTokenLen\"\s*:\s*[0-9]*/\"maxInputTokenLen\": $MAX_INPUT_TOKEN_LEN/" "$CONFIG_FILE"
            sed -i "s/\"truncation\"\s*:\s*[a-z]*/\"truncation\": $TRUNCATION/" "$CONFIG_FILE"
            sed -i "s|\(\"npuDeviceIds\"\s*:\s*\[\[\)[^]]*\(]]\)|\1$NPU_DEVICE_IDS\2|" "$CONFIG_FILE"
            sed -i "s/\"worldSize\"\s*:\s*[0-9]*/\"worldSize\": $WORLD_SIZE/" "$CONFIG_FILE"
            sed -i "s/\"httpsEnabled\"\s*:\s*[a-z]*/\"httpsEnabled\": $HTTPS_ENABLED/" "$CONFIG_FILE"
            sed -i "s/\"multiNodesInferEnabled\"\s*:\s*[a-z]*/\"multiNodesInferEnabled\": $MULTI_NODES_INFER_ENABLED/" "$CONFIG_FILE"
            sed -i "s/\"ipAddress\"\s*:\s*\"[^\"]*\"/\"ipAddress\": \"$IP_ADDRESS\"/" "$CONFIG_FILE"
            sed -i "s/\"port\"\s*:\s*[0-9]*/\"port\": $PORT/" "$CONFIG_FILE"
            sed -i "s/\"managementIpAddress\"\s*:\s*\"[^\"]*\"/\"managementIpAddress\": \"$MANAGEMENT_IP_ADDRESS\"/" "$CONFIG_FILE"
            sed -i "s/\"managementPort\"\s*:\s*[0-9]*/\"managementPort\": $MANAGEMENT_PORT/" "$CONFIG_FILE"
            sed -i "s/\"metricsPort\"\s*:\s*[0-9]*/\"metricsPort\": $METRICS_PORT/" $CONFIG_FILE
            sed -i "s/\"npuMemSize\"\s*:\s*-*[0-9]*/\"npuMemSize\": $NPU_MEM_SIZE/" "$CONFIG_FILE"

            echo "Final config.json:"; cat $CONFIG_FILE
            # MindIE torch engine needs a master address even single-node.
            export MASTER_IP=127.0.0.1
            export MASTER_PORT=29500
            ${MIES_INSTALL_PATH}/bin/mindieservice_daemon
      ports:
        - { containerPort: 8080, protocol: TCP }
      resources:
        requests: { cpu: "8", memory: 32Gi }
        limits: { cpu: "16", memory: 96Gi }
      startupProbe:
        # 30B-A3B MoE cold load (~60GB) + first ATB compile can take a while.
        httpGet: { path: /v1/models, port: 8080, scheme: HTTP }
        failureThreshold: 100
        periodSeconds: 15
        timeoutSeconds: 10
      volumeMounts:
        - { name: dshm, mountPath: /dev/shm }
  supportedModelFormats:
    - name: transformers
      version: "1"
  volumes:
    - name: dshm
      emptyDir: { medium: Memory, sizeLimit: 8Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-30b-a3b-mindie-tp4
  namespace: demo
  annotations:
    aml-model-repo: qwen3-30b-a3b
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/readonly: "false"               # MindIE must write model volume / conf
    serving.knative.dev/progress-deadline: "2400s"
  labels:
    aml.cpaas.io/runtime-type: mindie
spec:
  predictor:
    hostIPC: true                                     # TP=4 worker HCCL goes through host IPC
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: qwen3-30b-a3b-mindie-tp4
      storageUri: pvc://qwen3-30b-a3b-bf16/
      resources:
        requests: { cpu: "8", memory: 32Gi }
        limits:
          cpu: "16"
          memory: 96Gi
          huawei.com/Ascend910B3: "4"                 # four whole cards -> worldSize=4
          huawei.com/Ascend910B3-memory: "65536"
      securityContext: { runAsNonRoot: false, runAsUser: 0 }   # MindIE requires root for NPU access
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 1000 }
