# Qwen3.6-27B (W8A8) — vLLM-Ascend (nightly, release-pinned), TP=4 × 2 replicas
# (8 Ascend 910B4 whole cards). This is the validated 8-card aggregation
# topology: TWO TP=4 replicas behind the KServe predictor Service, a half-scale
# reproduction of the fuyao "InferNex v26.06" agg-base baseline. Latency is
# directly comparable; aggregate throughput scales with the replica count.
#
# Qwen3.6-27B is the `qwen3_5` architecture (Gated DeltaNet linear-attention
# hybrid + multimodal + native MTP). Only the vLLM-Ascend *nightly* image can
# load it — MindIE and vLLM-Ascend v0.18 cannot. Required engine flags:
#   --quantization ascend        W8A8 weights (config.json has no quant block)
#   --no-enable-prefix-caching   mandatory for the GDN hybrid cache
#   --language-model-only        skip the vision tower for text-only serving
#   --speculative-config qwen3_5_mtp + FULL_DECODE_ONLY graph + async-scheduling
#
# IMAGE TAG: use the release-pinned `nightly-releases-v0.22.1rc-openeuler`, NOT
# the moving `nightly-main-openeuler` — the latter drifted to a broken build
# (imports vLLM symbols removed in 0.22.1, so the TP workers crash and qwen3_5
# never loads). The toolkit env is sourced before `vllm serve` (TP workers
# otherwise crash on libop_plugin_atb.so).
#
# Edit metadata.namespace, the image tag (match your host CANN / NPU driver),
# and storageUri (a PVC of the W8A8 weights, or an oci:// ModelCar) before
# applying. The Ascend resource key (huawei.com/Ascend910) is this node's
# device-plugin key — adjust it for your actual NPU model.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-6-27b-w8a8-vllm-ascend-nightly
  namespace: demo
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  supportedModelFormats:
    - name: transformers
      version: "1"
      autoSelect: false
  containers:
    - name: kserve-container
      image: quay.io/ascend/vllm-ascend:nightly-releases-v0.22.1rc-openeuler
      # qwen3_5 needs the Ascend toolkit env sourced before `vllm serve`. Keep
      # this script free of angle-bracket text — KServe renders the command
      # through Go html/template, which fails on any literal HTML-looking tag.
      command:
        - bash
        - -lc
        - |
          set -e
          for f in /usr/local/Ascend/ascend-toolkit/set_env.sh \
                   /usr/local/Ascend/nnal/atb/set_env.sh \
                   /usr/local/Ascend/nnal/asdsip/set_env.sh; do
            [ -f "$f" ] && source "$f"
          done
          MODEL_PATH="/mnt/models"
          if [ -n "${MODEL_NAME}" ] && [ -d "/mnt/models/${MODEL_NAME}" ]; then MODEL_PATH="/mnt/models/${MODEL_NAME}"; fi
          exec vllm serve "${MODEL_PATH}" \
            --served-model-name {{.Name}} {{.Namespace}}/{{.Name}} \
            --port 8080 \
            "$@"
        - bash
      env:
        - name: MODEL_NAME
          value: '{{ index .Annotations "aml-model-repo" }}'
        - { name: HOME, value: /tmp }
        - { name: PYTORCH_NPU_ALLOC_CONF, value: "expandable_segments:True" }
        - { name: HCCL_BUFFSIZE, value: "512" }
        - { name: OMP_PROC_BIND, value: "false" }
        - { name: OMP_NUM_THREADS, value: "1" }
        - { name: TASK_QUEUE_ENABLE, value: "1" }
        - { name: HCCL_OP_EXPANSION_MODE, value: AIV }
        - { name: VLLM_USE_V1, value: "1" }
        - { name: HF_HUB_OFFLINE, value: "1" }
      ports:
        - { containerPort: 8080, name: http1, protocol: TCP }
      securityContext:
        # Ascend CANN needs real root (davinci_manager ioctls, driver file access).
        allowPrivilegeEscalation: false
        runAsNonRoot: false
        runAsUser: 0
      resources:
        requests: { cpu: "4", memory: 24Gi }
        limits: { cpu: "4", memory: 24Gi }
      startupProbe:
        # qwen3_5 graph capture (FULL_DECODE_ONLY) can take minutes on first cold
        # start — allow up to ~40 min before failing.
        httpGet: { path: /health, port: 8080 }
        failureThreshold: 160
        periodSeconds: 15
        timeoutSeconds: 5
      volumeMounts:
        - { name: devshm, mountPath: /dev/shm }
  volumes:
    - name: devshm
      emptyDir: { medium: Memory, sizeLimit: 16Gi }
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-6-27b-w8a8
  namespace: demo
  annotations:
    aml-model-repo: qwen36-27b-w8a8
    aml.cpaas.io/runtime-type: vllm
    serving.kserve.io/deploymentMode: Standard
    serving.knative.dev/progress-deadline: "3600s"
  labels:
    aml.cpaas.io/runtime-type: vllm
spec:
  predictor:
    minReplicas: 2          # 2 replicas × TP=4 = 8 cards (fills one 8-card node)
    maxReplicas: 2
    deploymentStrategy: { type: Recreate }
    model:
      modelFormat: { name: transformers }
      runtime: qwen3-6-27b-w8a8-vllm-ascend-nightly
      storageUri: pvc://qwen36-27b-w8a8/
      args:
        # Exactly the validated agg-base engine flags.
        - --tensor-parallel-size
        - "4"
        - --quantization
        - ascend
        - --max-num-seqs                    # required guardrail against concurrency avalanche
        - "32"
        - --max-model-len                   # covers the 17.5k multi-turn workload (~19.5k peak)
        - "24576"
        - --max-num-batched-tokens
        - "8192"
        - --gpu-memory-utilization
        - "0.85"                            # 0.85, NOT 0.90 — 0.90 OOMs at high concurrency with MTP
        - --no-enable-prefix-caching        # mandatory for the GDN hybrid cache
        - --language-model-only             # text-only serving: skip the vision tower
        - --trust-remote-code
        - --speculative-config
        - '{"method":"qwen3_5_mtp","num_speculative_tokens":3,"enforce_eager":true}'
        - --compilation-config
        - '{"cudagraph_mode":"FULL_DECODE_ONLY","cudagraph_capture_sizes":[1,2,4,8,16,24,32]}'
        - --additional-config
        - '{"enable_cpu_binding":true}'
        - --async-scheduling
      env:
        - { name: HOME, value: /tmp }
      resources:
        requests: { cpu: "4", memory: 24Gi }
        limits:
          cpu: "16"
          memory: 96Gi
          huawei.com/Ascend910: "4"          # four whole cards per replica (TP=4)
      securityContext: { allowPrivilegeEscalation: false, runAsNonRoot: false, runAsUser: 0 }
    securityContext: { runAsNonRoot: false, runAsUser: 0, runAsGroup: 0, fsGroup: 0, supplementalGroups: [0] }
