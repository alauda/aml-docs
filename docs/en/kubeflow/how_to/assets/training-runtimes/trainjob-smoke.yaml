# Smoke TrainJob that exercises any of the published TrainingRuntimes.
# Set `spec.runtimeRef.name` to one of:
#   torch2.6-cu126-amd64
#   torch2.6-cann8.5-arm64
#   llamafactory0.9-cu126-amd64
#   llamafactory0.9-cann8.5-arm64
#   traininghub0.1-cu126-amd64
#   mindspeed-llm-cann8.5-arm64
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  generateName: smoke-
  namespace: kubeflow-admin-cpaas-io
spec:
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: TrainingRuntime
    name: torch2.6-cu126-amd64
  suspend: false
  trainer:
    numNodes: 1
