# Per-namespace queues pointing at the cohort defined in cluster-queues.yaml.
# Edit `namespace:` to the namespace where you submit jobs, or render with
#   sed "s/<your-namespace>/$NS/" | kubectl apply -f -
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: c12-inference-lq
  namespace: <your-namespace>
spec:
  clusterQueue: c12-inference-cq
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: c12-training-lq
  namespace: <your-namespace>
spec:
  clusterQueue: c12-training-cq
