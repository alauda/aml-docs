apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: torch2.6-cann8.5-arm64
  namespace: kubeflow-admin-cpaas-io
  labels:
    trainer.kubeflow.org/framework: torch
    alauda.io/training-runtime: torch2.6-cann8.5-arm64
spec:
  mlPolicy:
    numNodes: 1
    torch:
      numProcPerNode: auto
  template:
    spec:
      replicatedJobs:
        - name: node
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              backoffLimit: 0
              template:
                spec:
                  schedulerName: hami-scheduler
                  runtimeClassName: ascend
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 1001
                    runAsGroup: 1001
                    fsGroup: 1001
                  containers:
                    - name: node
                      image: docker.io/alaudadockerhub/torch2.6-cann8.5-arm64:v0.1.0
                      command:
                        - bash
                        - -c
                        - |
                          set -e
                          # CANN runtime libs (libhccl.so etc.) live under /usr/local/Ascend, which
                          # the `ascend` runtime class bind-mounts from the host. The image does not
                          # auto-set LD_LIBRARY_PATH — every CANN entrypoint must source set_env.sh.
                          source /usr/local/Ascend/ascend-toolkit/set_env.sh
                          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
                          python -c '
                          import os, torch, torch_npu, torch_npu.utils
                          print(f"torch={torch.__version__} torch_npu={torch_npu.__version__}")
                          print(f"npu_available={torch_npu.npu.is_available()} count={torch_npu.npu.device_count()}")
                          if torch_npu.npu.is_available():
                              x = torch.randn(1024, 1024).npu()
                              y = x @ x.T
                              print(f"matmul ok shape={tuple(y.shape)} mean={y.mean().item():.4f}")
                          '
                      resources:
                        requests:
                          cpu: "1"
                          memory: 2Gi
                        limits:
                          cpu: "4"
                          memory: 8Gi
                          huawei.com/Ascend910B4: "1"
                          huawei.com/Ascend910B4-memory: "8192"
                      securityContext:
                        allowPrivilegeEscalation: false
                        capabilities:
                          drop: [ALL]
                        runAsNonRoot: true
                        seccompProfile:
                          type: RuntimeDefault
                      volumeMounts:
                        - { name: workspace, mountPath: /workspace }
                        - { name: dshm, mountPath: /dev/shm }
                  volumes:
                    - { name: workspace, emptyDir: {} }
                    - name: dshm
                      emptyDir:
                        medium: Memory
                        sizeLimit: 1Gi
